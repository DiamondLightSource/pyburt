sudo: false
language: python
python:
  - "3.7"
dist: xenial # 3.7 issue: https://github.com/travis-ci/travis-ci/issues/9815

install:
  - pip install pipenv
  - pipenv install --dev

script:
  - pipenv run python -m pytest --cov=burt --cov-report term-missing --cov-fail-under 90 tests
  - pipenv run pycodestyle --show-source --show-pep8 burt
  - pipenv run pydocstyle -e burt
  - pipenv run sphinx-build -b html -E -q docs docs/_build/html

after_success:
  - coveralls
