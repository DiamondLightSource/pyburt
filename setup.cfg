[pycodestyle]

# Ignore E402 as it conflicts with the dls from-require import
# style which may come before module imports
# Ignore W503 and W504 as they seem to be controversial.
ignore = E402,W503,W504

[metadata]
name = pyburt
version = file: pyburt/VERSION
description = Python version of BURT
author = Ito Alcuaz
author_email = ito.alcuaz@diamond.ac.uk

[easy_install]
find_links = https://github.com/dls-controls/cothread.git/repo/tarball/master#egg=package-1.0
 
[options]
packages = pyburt
include_package_data = False
install_requires =
    pytest
    sphinx==1.8.5
    pycodestyle
    pytest-cov
    mock
    configparser
    pydocstyle
    coveralls
    cothread
 
[options.package_data]
pyburt = VERSION
 
[options.entry_points]
console_scripts =
    fetch_title = pyburt.req:main
