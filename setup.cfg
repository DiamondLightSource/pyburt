[metadata]
name = pyburt
version = file: burt/VERSION
description = Python version of BURT
author = Ito Alcuaz
author_email = ito.alcuaz@diamond.ac.uk
license = Apache
url = https://gitlab.diamond.ac.uk/controls/python3/pyburt

[options]
packages = burt, burt.config, burt.parsers, burt.writers, burt.utils
include_package_data = true
install_requires =
    cothread>=2.15
    pygelf
tests_require =
    pytest
    pycodestyle
    pytest-cov
    mock
    configparser
    pydocstyle
    coveralls
    sphinx
    mypy

[options.package_data]
burt = VERSION

[options.entry_points]
console_scripts =
    burt-read = burt.read:main
    burt-write = burt.write:main

[flake8]
# Ignore E402 as it conflicts with the dls from-require import
# style which may come before module imports
# Ignore W503 and W504 as they seem to be controversial.
# Ignore E203 which Black claims violates PEP 8.
# The ui directory is autogenerated by pyuic5.
exclude = ui
ignore = E203,E402,E126,W503,W504
# Use the default from Black.
max-line-length = 88
# Tests import from the test package.
application-import-names = burt,test

import-order-style = smarkets

[pycodestyle]
# Ignore E402 as it conflicts with the dls from-require import
# style which may come before module imports
# Ignore W503 and W504 as they seem to be controversial.
ignore = E402,W503,W504
# Use the default from Black.
max-line-length = 88

[mypy]
# Dls libraries e.g. cothread, are not recognised properly.
ignore_missing_imports = True
