rhel7_job:
  tags:
    - rhel7
  script:
    - virtualenv --python dls-python venv
    - source venv/bin/activate
    - pip install pytest
    - pip install pytest-cov
    - pip install cothread
    - pip install pycodestyle
    - python -m pytest --cov=burt test
    - pycodestyle --show-source --show-pep8 burt