include:
  - project: 'controls/reports/ci_templates'
    ref: 0-13
    file: 'all_templates.yml'

stages:
  - run tests
  - static code checks
  - publish coverage
  - publish docs

# Run unit tests, make coverage report and build docs
Unit tests and coverage:
  stage: run tests
  extends:
    - .template_py3_pytest_and_coverage
  variables:
    COVERAGE_ARGS: --cov=burt --cov-report term-missing --cov-fail-under 90
    TEST_DIR: test/unit
  artifacts:
    paths:
      # Pass on virtualenv, coverage and built docs to following stages
      - .coverage
      - docs/_build/html/
    expire_in: 10 min

# Run our custom static checks
Static code checks:
  tags:
    - rhel7
  stage: static code checks
  variables:
    FLAKE8_MODULES: burt test
    BLACK_MODULES: burt test
    MYPY_MODULES: burt
  script:
    - pipenv run flake8 --show-source ${FLAKE8_MODULES}
    - pipenv run black ${BLACK_MODULES} --check
    - pipenv run mypy --pretty --python-version=3.7 ${MYPY_MODULES}

# Publish coverage html report to common location
Publish coverage:
  stage: publish coverage
  extends:
    .template_publish_coverage

# Install the docs for each push to master to "latest"
Install docs for latest master:
  stage: publish docs
  tags:
    - rhel7
  only:
    - master
  script:
    - pipenv run sphinx-build -b html -E -q docs docs/_build/html
    - mkdir -p ${DOCS_PUBLISH_ROOT}
    - cp -rf docs/_build/html ${DOCS_PUBLISH_ROOT}/latest

# Install the docs for each tag to their own directory
Install docs for tags:
  stage: publish docs
  tags:
    - rhel7
  only:
    - tags
  script:
    - pipenv run sphinx-build -b html -E -q docs docs/_build/html
    - mkdir -p ${DOCS_PUBLISH_ROOT}
    - cp -rf docs/_build/html ${DOCS_PUBLISH_ROOT}/${CI_COMMIT_TAG}

