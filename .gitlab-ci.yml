rhel7_job:
  tags:
    - rhel7
  script:
    - dls-python3 -m venv venv
    - source venv/bin/activate
    - pip3 install pytest
    - pip3 install pytest-cov
    - pip3 install cothread
    - pip3 install mock
    - pip3 install sphinx
    - pip3 install flake8
    - pip3 install flake8-docstrings
    - pip3 install flake8-import-order
    - pip3 install black
    - python3 -m pytest --cov=burt --cov-report term-missing --cov-fail-under 90 test
    - sphinx-build -b html -E -q docs docs/_build/html
    - flake8 --show-source burt
    - black burt --check
    - black test --check
